document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

      var __wave = function (y, amp) {

        +   'letter-spacing:.2em;font-size:11px;color:#7e8492;font-family:ui-monospace,monospace;'
        +   'opacity:0;animation:ei-fade 2s ease forwards .9s;}'
        + '#__emmark_intro .ei-boat{position:absolute;left:50%;bottom:34vh;width:clamp(120px,17vw,170px);'
        +   'transform:translateX(-50%);}'
        + '#__emmark_intro .ei-ark{transform-box:fill-box;transform-origin:50% 100%;'
        +   'animation:ei-bob 3.6s ease-in-out infinite;}'
        + '#__emmark_intro .ei-sea{position:absolute;left:0;bottom:0;width:100%;height:46vh;}'
        + '#__emmark_intro .ei-sea svg{width:100%;height:100%;display:block;}'
        + '#__emmark_intro .ei-w1{animation:ei-wave 6s linear infinite;}'
        + '#__emmark_intro .ei-w2{animation:ei-wave 8.5s linear infinite reverse;opacity:.66;}'
        + '#__emmark_intro .ei-w3{animation:ei-wave 11s linear infinite;opacity:.4;}'
        + '#__emmark_intro.ei-sail .ei-boat{transform:translateX(-50%) translateY(-72vh) rotate(-6deg) scale(.7);'
        +   'opacity:0;transition:transform 1.1s cubic-bezier(.4,0,.6,1),opacity 1.1s ease;}'
        + '#__emmark_intro.ei-sail .ei-cap,#__emmark_intro.ei-sail .ei-sub{opacity:0;transition:opacity .5s ease;}'
        + '@keyframes ei-bob{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-13px) rotate(4deg);}}'
        + '@keyframes ei-wave{from{transform:translateX(0);}to{transform:translateX(-1200px);}}'
        + '@keyframes ei-fade{to{opacity:1;}}'
        + '@media (prefers-reduced-motion:reduce){#__emmark_intro .ei-ark,#__emmark_intro .ei-w1,'
        +   '#__emmark_intro .ei-w2,#__emmark_intro .ei-w3{animation:none;}}'
        + '</style>'
        + '<div class="ei-glow"></div>'
        + '<div class="ei-cap">乘 風 破 浪</div>'
        + '<div class="ei-sub">EMMARK · 以馬內利 × 方舟</div>'
        + '<div class="ei-boat">'
        +   '<svg viewBox="400 224 420 358" width="100%" xmlns="http://www.w3.org/2000/svg">'
        +     '<g class="ei-ark">'
        +       '<path d="M610 250 L610 470 L500 470 Z" fill="#f5a623"/>'
        +       '<rect x="597" y="242" width="26" height="236" rx="13" fill="#f5a623"/>'
        +       '<path d="M420 490 Q610 610 800 490 L755 490 Q610 555 465 490 Z" fill="#f5a623"/>'
        +     '</g>'
        +   '</svg>'
        + '</div>'
        + '<div class="ei-sea">'
        +   '<svg viewBox="0 0 1200 240" preserveAspectRatio="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">'
        +     '<defs><linearGradient id="ei-grad" gradientUnits="userSpaceOnUse" x1="0" y1="20" x2="0" y2="240">'
        +       '<stop offset="0" stop-color="#fbc24e"/><stop offset="1" stop-color="#b86a12"/>'
        +     '</linearGradient></defs>'
        +     '<path class="ei-w3" fill="url(#ei-grad)" d="' + __wave(70, 40) + '"/>'
        +     '<path class="ei-w2" fill="url(#ei-grad)" d="' + __wave(98, 46) + '"/>'
        +     '<path class="ei-w1" fill="url(#ei-grad)" d="' + __wave(126, 50) + '"/>'
        +   '</svg>'
        + '</div>';
      document.documentElement.appendChild(__ark);
      var __ovf = document.documentElement.style.overflow;
      document.documentElement.style.overflow = 'hidden';
      setTimeout(function () { __ark.classList.add('ei-sail'); }, 2400);
      setTimeout(function () { __ark.classList.add('ei-done'); }, 2750);
      setTimeout(function () {
        if (__ark.parentNode) __ark.parentNode.removeChild(__ark);
        document.documentElement.style.overflow = __ovf;
      }, 3750);
    } catch (e) { /* 進站動畫為非必要，失敗就直接進站 */ }
    // ───────────────────────────────────────────────────────────────
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

245,166,35,.4);border-radius:99px;font-size:13px;font-family:'JetBrains Mono',monospace;color:#f5a623;margin-bottom:30px;background:rgba(245,166,35,.06);\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#f5a623;animation:pulseRing 2s infinite;\"><\u002Fspan>\n        OPEN TO BUILD · 全端 × AI 協作\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Noto Serif TC',serif;font-weight:900;font-size:clamp(40px,7vw,84px);line-height:1.08;letter-spacing:-.01em;margin-bottom:24px;text-wrap:balance;\">\n        全端開發者 <span style=\"color:#f5a623;\">×<\u002Fspan> AI 協作<br>\n        <span class=\"title-flow\" data-typewriter=\"用程式碼解決真實問題\">用程式碼解決真實問題<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"font-size:clamp(16px,2vw,21px);line-height:1.65;color:#b6bbc6;max-width:680px;margin-bottom:14px;\">\n        6 個月，10 個部署專案，117,124+ 行程式碼。\n      <\u002Fp>\n      <p style=\"font-size:clamp(14px,1.6vw,17px);color:#7e8492;margin-bottom:44px;font-family:'JetBrains Mono',monospace;\">\n        教會系統 · RPG 遊戲 · 音樂工具 · 互動裝置\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(12px,2vw,24px);max-width:640px;margin-bottom:44px;opacity:0;transform:translateY(24px);transition:opacity .8s ease .15s,transform .8s ease .15s;\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"3\">\n        <div style=\"border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:clamp(16px,2.5vw,24px);background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0));\">\n          <div style=\"font-family:'Noto Serif TC',serif;font-weight:900;font-size:clamp(30px,5vw,46px);line-height:1;color:#f5a623;\">{{ s.num }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:#9aa0ac;margin-top:8px;\">{{ s.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"position:relative;display:flex;gap:14px;flex-wrap:wrap;opacity:0;transform:translateY(24px);transition:opacity .8s ease .3s,transform .8s ease .3s;\">\n      <a href=\"#work\" style=\"display:inline-flex;align-items:center;gap:10px;background:#f5a623;color:#0f1117;font-weight:700;padding:14px 28px;border-radius:99px;font-size:15px;transition:transform .2s,box-shadow .2s;\" style-hover=\"transform:translateY(-2px);box-shadow:0 10px 28px rgba(245,166,35,.4);\">查看作品 →<\u002Fa>\n      <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.16);color:#e8e6e1;font-weight:500;padding:14px 28px;border-radius:99px;font-size:15px;transition:border-color .2s,background .2s;\" style-hover=\"border-color:rgba(245,166,35,.6);background:rgba(245,166,35,.06);\">聯絡我<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- MISSION -->\n  <section id=\"mission\" style=\"max-width:1200px;margin:0 auto;padding:24px clamp(20px,5vw,64px) 8px;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;position:relative;overflow:hidden;border:1px solid rgba(245,166,35,.2);border-radius:24px;padding:clamp(28px,5vw,52px);background:linear-gradient(150deg,rgba(245,166,35,.08),rgba(239,108,58,.03) 55%,rgba(255,255,255,.012));\">\n      <div style=\"position:absolute;top:-30%;right:-8%;width:360px;height:360px;background:radial-gradient(circle,rgba(245,166,35,.14),transparent 65%);filter:blur(20px);pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#f5a623;letter-spacing:.18em;margin-bottom:14px;\">緣起 · WHY I BUILD<\u002Fdiv>\n        <h2 style=\"font-family:'Noto Serif TC',serif;font-weight:900;font-size:clamp(28px,4.5vw,46px);line-height:1.18;margin-bottom:22px;\">用程式碼<span style=\"color:#f5a623;\">服事<\u002Fspan><\u002Fh2>\n\n        <blockquote style=\"font-family:'Noto Serif TC',serif;font-size:clamp(17px,2.4vw,24px);line-height:1.7;color:#f0ede6;border-left:3px solid #f5a623;padding-left:18px;margin:0 0 24px;text-wrap:pretty;\">\n          「義人要發旺如棕樹，生長如黎巴嫩的香柏樹。」\n          <span style=\"display:block;font-family:'JetBrains Mono',monospace;font-size:13px;color:#9aa0ac;margin-top:8px;letter-spacing:.05em;\">— 詩篇 92:12 · 我剛信主時神放在心裡的話，也是 EMMARK 那棵棕樹的由來 🌴<\u002Fspan>\n        <\u002Fblockquote>\n\n        <p style=\"font-size:clamp(15px,1.9vw,18px);line-height:1.85;color:#c2c7d0;max-width:760px;margin:0 0 14px;text-wrap:pretty;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;color:#f5a623;letter-spacing:.04em;\">EMMARK<\u002Fspan> = <span style=\"color:#e8e6e1;\">以馬內利<\u002Fspan>（Emmanuel，神與我們同在）<span style=\"color:#f5a623;\">×<\u002Fspan> <span style=\"color:#e8e6e1;\">方舟<\u002Fspan>（Ark）。我想做的，是一艘<span style=\"color:#e8e6e1;font-weight:600;\">安靜的方舟<\u002Fspan>——承載、守護，把對的人安然帶到對的地方。\n        <\u002Fp>\n\n        <p style=\"font-size:clamp(15px,1.9vw,18px);line-height:1.85;color:#c2c7d0;max-width:760px;margin:0 0 14px;text-wrap:pretty;\">\n          我寫程式，不只是把功能做出來，而是想讓教會的同工<span style=\"color:#f5a623;\">少一點行政重擔、多一點時間陪伴人<\u002Fspan>。報名、簽到、小組關懷、靈修陪讀——這些看似瑣碎的流程，背後都是一個個真實的服事現場。\n        <\u002Fp>\n        <p style=\"font-size:clamp(15px,1.9vw,18px);line-height:1.85;color:#c2c7d0;max-width:760px;margin:0 0 26px;text-wrap:pretty;\">\n          我相信好的工具應該是<span style=\"color:#e8e6e1;font-weight:600;\">「安靜的」<\u002Fspan>：它不搶戲，只是讓對的人、在對的時間，把愛傳出去。棕樹不結華麗的花，卻能在曠野為人遮蔭、結出甜美的椰棗——我希望我做的系統也是這樣。\n        <\u002Fp>\n\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n          <span style=\"font-size:13.5px;color:#e8e6e1;background:rgba(255,255,255,.05);border:1px solid rgba(245,166,35,.25);border-radius:99px;padding:9px 16px;\">🤝 小組長 3 分鐘交完週報<\u002Fspan>\n          <span style=\"font-size:13.5px;color:#e8e6e1;background:rgba(255,255,255,.05);border:1px solid rgba(245,166,35,.25);border-radius:99px;padding:9px 16px;\">📲 會友用 LINE 一鍵報名簽到<\u002Fspan>\n          <span style=\"font-size:13.5px;color:#e8e6e1;background:rgba(255,255,255,.05);border:1px solid rgba(245,166,35,.25);border-radius:99px;padding:9px 16px;\">🗂 行政把重複工作交給系統<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT / philosophy strip -->\n  <section id=\"about\" style=\"max-width:1200px;margin:0 auto;padding:40px clamp(20px,5vw,64px);\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;border-top:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07);padding:36px 0;\">\n      <p style=\"font-family:'Noto Serif TC',serif;font-size:clamp(20px,2.6vw,30px);line-height:1.55;color:#e8e6e1;max-width:900px;text-wrap:pretty;\">\n        老實說，這頁的每一個專案，都是我 <span style=\"color:#f5a623;\">與 AI 協作<\u002Fspan> 完成的——程式碼大量交給 AI 實作。我把自己當成 <span style=\"color:#f5a623;\">產品負責人<\u002Fspan>，AI 是我 10 倍速的工程師夥伴 —— 從需求、架構到上線把關，每一個產品判斷都是我的。\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROJECTS -->\n  <section id=\"work\" style=\"max-width:1200px;margin:0 auto;padding:60px clamp(20px,5vw,64px) 40px;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;margin-bottom:44px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#f5a623;letter-spacing:.18em;margin-bottom:12px;\">01 — PROJECTS<\u002Fdiv>\n      <h2 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:clamp(30px,4.5vw,52px);line-height:1.1;\">精選作品<\u002Fh2>\n      <p style=\"color:#9aa0ac;margin-top:14px;font-size:16px;max-width:600px;\">10 個從零到部署的專案，涵蓋後端架構、AI 整合、即時互動與跨平台打包。原始碼為私有倉庫。<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"filter-bar\" data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px;\">\n      <button class=\"filter-chip is-active\" data-filter=\"all\">全部<\u002Fbutton>\n      <button class=\"filter-chip\" data-filter=\"教會服務\">教會服務<\u002Fbutton>\n      <button class=\"filter-chip\" data-filter=\"互動體驗\">互動體驗<\u002Fbutton>\n      <button class=\"filter-chip\" data-filter=\"創作工具\">創作工具<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,440px),1fr));gap:24px;\">\n      <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"9\">\n        <article data-reveal=\"\" data-tilt=\"\" data-category=\"{{ p.category }}\" data-repo=\"{{ p.repo }}\" style=\"position:relative;display:flex;flex-direction:column;opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease,border-color .3s,box-shadow .3s;overflow:hidden;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.012));\" style-hover=\"transform:translateY(-6px);border-color:rgba(255,255,255,.2);box-shadow:0 18px 40px rgba(0,0,0,.35);\">\n          <div class=\"card-sheen\"><\u002Fdiv>\n          <div style=\"position:relative;height:144px;overflow:hidden;background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.012));border-bottom:1px solid rgba(255,255,255,.06);\">\n            <div style=\"position:absolute;inset:0;background:radial-gradient(circle at 80% 28%, {{ p.color }}33, transparent 62%);\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1px);background-size:15px 15px;mask-image:linear-gradient(90deg,#000,transparent 85%);\"><\u002Fdiv>\n            <span style=\"position:absolute;right:14px;bottom:-30px;font-family:'Noto Serif TC',serif;font-weight:900;font-size:132px;line-height:1;color:{{ p.color }};opacity:.24;pointer-events:none;\">{{ p.glyph }}<\u002Fspan>\n            <span style=\"position:absolute;left:24px;top:20px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;color:{{ p.color }};\">{{ p.no }} / 10<\u002Fspan>\n            <span style=\"position:absolute;right:18px;top:18px;display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#9aa0ac;font-family:'JetBrains Mono',monospace;\">\n              <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n              PRIVATE\n            <\u002Fspan>\n            <span style=\"position:absolute;left:24px;bottom:18px;font-size:12px;color:#cfd3db;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);padding:4px 11px;border-radius:99px;backdrop-filter:blur(4px);\">{{ p.kind }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;flex:1;padding:24px 26px 24px;\">\n            <h3 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:23px;line-height:1.25;\">{{ p.name }}<\u002Fh3>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#6f7682;margin-top:5px;margin-bottom:12px;\">{{ p.repo }}<\u002Fdiv>\n            <p style=\"color:#c3c8d2;font-size:14.5px;line-height:1.5;margin-bottom:16px;\">{{ p.tagline }}<\u002Fp>\n\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;\">\n              <sc-for list=\"{{ p.tags }}\" as=\"t\" hint-placeholder-count=\"4\">\n                <span class=\"tag-term\" data-term=\"1\" role=\"button\" tabindex=\"0\" style=\"font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#aeb4c0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:4px 10px;border-radius:99px;\">{{ t }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <ul style=\"list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:18px;\">\n              <sc-for list=\"{{ p.features }}\" as=\"f\" hint-placeholder-count=\"4\">\n                <li style=\"display:flex;gap:10px;font-size:13.5px;line-height:1.5;color:#aab0bc;\">\n                  <span style=\"color:{{ p.color }};flex-shrink:0;margin-top:1px;\">▸<\u002Fspan>\n                  <span>{{ f }}<\u002Fspan>\n                <\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n\n            <div style=\"display:flex;align-items:center;gap:9px;border:1px solid {{ p.color }};border-radius:10px;padding:10px 14px;margin-top:auto;background:rgba(245,166,35,.02);\">\n              <span style=\"font-size:14px;\">★<\u002Fspan>\n              <span style=\"font-size:13px;line-height:1.45;color:#e0e3ea;\"><strong style=\"color:{{ p.color }};\">亮點<\u002Fstrong> · {{ p.highlight }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- META: this very page -->\n  <section style=\"max-width:1200px;margin:0 auto;padding:8px clamp(20px,5vw,64px) 40px;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;position:relative;overflow:hidden;border:1px dashed rgba(245,166,35,.35);border-radius:20px;padding:clamp(24px,4vw,40px);background:linear-gradient(135deg,rgba(245,166,35,.06),rgba(124,108,240,.04));\">\n      <div style=\"position:absolute;top:-30%;left:-6%;width:300px;height:300px;background:radial-gradient(circle,rgba(124,108,240,.16),transparent 65%);filter:blur(20px);pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative;display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;\">\n        <div style=\"font-size:2rem;line-height:1;\">🎨<\u002Fdiv>\n        <div style=\"flex:1;min-width:240px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#f5a623;letter-spacing:.16em;margin-bottom:8px;\">P.S. — ONE MORE THING<\u002Fdiv>\n          <h3 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:clamp(20px,3vw,28px);line-height:1.25;margin-bottom:10px;\">對了，你正在看的<span style=\"color:#f5a623;\">這一頁<\u002Fspan>，也是我做的。<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.75;color:#9aa0ac;max-width:720px;margin-bottom:14px;text-wrap:pretty;\">\n            從 Claude Artifact 匯出後親手瘦身 <span style=\"color:#e8e6e1;\">14MB → ~100KB<\u002Fspan>（字型轉 CDN、移除 800+ 內嵌字型子集），純前端原生 JS、無框架執行期。你剛剛滑過的流動極光、滑鼠光暈、卡片 3D 傾斜、標題打字機、技術棧翻卡、術語點擊詞典——全是手刻，部署在 GitHub Pages（含社群分享卡與 SEO）。\n          <\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;\">\n            <span style=\"font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#aeb4c0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:4px 10px;border-radius:99px;\">Vanilla JS<\u002Fspan>\n            <span style=\"font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#aeb4c0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:4px 10px;border-radius:99px;\">CSS Animation<\u002Fspan>\n            <span style=\"font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#aeb4c0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:4px 10px;border-radius:99px;\">效能優化 99%↓<\u002Fspan>\n            <span style=\"font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#aeb4c0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:4px 10px;border-radius:99px;\">GitHub Pages<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:#6c7480;\">小彩蛋：試試連點左上角 logo 5 下 🌴<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DATA VISUALIZATION -->\n  <section id=\"data\" style=\"max-width:1200px;margin:0 auto;padding:60px clamp(20px,5vw,64px) 40px;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;margin-bottom:40px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#f5a623;letter-spacing:.18em;margin-bottom:12px;\">02 — BY THE NUMBERS<\u002Fdiv>\n      <h2 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:clamp(30px,4.5vw,52px);line-height:1.1;\">用數據說話<\u002Fh2>\n      <p style=\"color:#9aa0ac;margin-top:14px;font-size:16px;max-width:600px;\">6 個月持續產出的真實軌跡。<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:24px;\">\n      <sc-for list=\"{{ bigStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:26px 22px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0));\">\n          <div style=\"font-family:'Noto Serif TC',serif;font-weight:900;font-size:clamp(32px,4.5vw,46px);line-height:1;color:#f5a623;\"><span data-count=\"{{ s.count }}\" data-suffix=\"{{ s.suffix }}\">0<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px;color:#9aa0ac;margin-top:10px;\">{{ s.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,360px),1fr));gap:24px;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:30px;background:rgba(255,255,255,.018);\">\n        <h3 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:19px;margin-bottom:24px;\">技術使用頻率<\u002Fh3>\n        <div style=\"display:flex;flex-direction:column;gap:17px;\">\n          <sc-for list=\"{{ techFreq }}\" as=\"t\" hint-placeholder-count=\"7\">\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px;\">\n                <span style=\"color:#d8dbe2;font-weight:500;\">{{ t.label }}<\u002Fspan>\n                <span style=\"color:#7e8492;font-family:'JetBrains Mono',monospace;\">{{ t.countLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:8px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;\">\n                <div data-bar=\"{{ t.pct }}\" style=\"width:0;height:100%;border-radius:99px;background:linear-gradient(90deg,#f5a623,#ef6c3a);transition:width 1.1s cubic-bezier(.2,.8,.2,1);\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease .1s,transform .8s ease .1s;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:30px;background:rgba(255,255,255,.018);\">\n        <h3 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:19px;margin-bottom:24px;\">專案領域分布<\u002Fh3>\n        <div style=\"display:flex;align-items:center;gap:30px;flex-wrap:wrap;justify-content:center;\">\n          <div style=\"position:relative;width:170px;height:170px;border-radius:50%;background:{{ donutGradient }};flex-shrink:0;\">\n            <div style=\"position:absolute;inset:27px;border-radius:50%;background:#11141b;display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n              <span style=\"font-family:'Noto Serif TC',serif;font-weight:900;font-size:42px;line-height:1;color:#e8e6e1;\">10<\u002Fspan>\n              <span style=\"font-size:12px;color:#9aa0ac;margin-top:4px;\">個專案<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px;min-width:170px;flex:1;\">\n            <sc-for list=\"{{ categories }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:10px;font-size:13.5px;\">\n                <span style=\"width:11px;height:11px;border-radius:3px;background:{{ c.color }};flex-shrink:0;\"><\u002Fspan>\n                <span style=\"color:#d8dbe2;\">{{ c.label }}<\u002Fspan>\n                <span style=\"color:#7e8492;font-family:'JetBrains Mono',monospace;margin-left:auto;\">{{ c.count }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TECH STACK -->\n  <section id=\"stack\" style=\"max-width:1200px;margin:0 auto;padding:60px clamp(20px,5vw,64px) 40px;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;margin-bottom:44px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#f5a623;letter-spacing:.18em;margin-bottom:12px;\">03 — STACK<\u002Fdiv>\n      <h2 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:clamp(30px,4.5vw,52px);line-height:1.1;\">技術棧<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:18px;\">\n      <sc-for list=\"{{ stack }}\" as=\"g\" hint-placeholder-count=\"9\">\n        <div class=\"flip\" data-reveal=\"\" tabindex=\"0\" role=\"button\" aria-label=\"翻卡看說明\" style=\"opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease;\">\n          <div class=\"flip-inner\">\n            <div class=\"flip-face flip-front\">\n              <span class=\"stack-icon\">{{ g.icon }}<\u002Fspan>\n              <span class=\"stack-title\">{{ g.title }}<\u002Fspan>\n              <span class=\"flip-hint\">點我看白話 ↻<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"flip-face flip-back\">\n              <p class=\"stack-plain\">{{ g.plain }}<\u002Fp>\n              <div class=\"stack-tools\">\n                <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n                  <span>{{ it }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- AI COLLABORATION -->\n  <section style=\"max-width:1200px;margin:0 auto;padding:60px clamp(20px,5vw,64px) 40px;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;margin-bottom:44px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#f5a623;letter-spacing:.18em;margin-bottom:12px;\">04 — HOW I WORK<\u002Fdiv>\n      <h2 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:clamp(30px,4.5vw,52px);line-height:1.1;\">我怎麼工作？<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,320px),1fr));gap:20px;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;border:1px solid rgba(245,166,35,.3);border-radius:18px;padding:30px;background:linear-gradient(180deg,rgba(245,166,35,.06),rgba(245,166,35,.01));\">\n        <div style=\"font-size:13px;font-family:'JetBrains Mono',monospace;color:#f5a623;margin-bottom:6px;\">PRODUCT OWNER<\u002Fdiv>\n        <h3 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:24px;margin-bottom:20px;\">我負責<\u002Fh3>\n        <ul style=\"list-style:none;display:flex;flex-direction:column;gap:13px;\">\n          <sc-for list=\"{{ ownerTasks }}\" as=\"t\" hint-placeholder-count=\"5\">\n            <li style=\"display:flex;gap:11px;font-size:15px;line-height:1.5;color:#d8dbe2;\"><span style=\"color:#f5a623;\">●<\u002Fspan><span>{{ t }}<\u002Fspan><\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .7s ease .1s,transform .7s ease .1s;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:30px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.008));\">\n        <div style=\"font-size:13px;font-family:'JetBrains Mono',monospace;color:#7c6cf0;margin-bottom:6px;\">SENIOR ENGINEER × AI<\u002Fdiv>\n        <h3 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:24px;margin-bottom:20px;\">AI 負責<\u002Fh3>\n        <ul style=\"list-style:none;display:flex;flex-direction:column;gap:13px;\">\n          <sc-for list=\"{{ aiTasks }}\" as=\"t\" hint-placeholder-count=\"5\">\n            <li style=\"display:flex;gap:11px;font-size:15px;line-height:1.5;color:#b6bbc6;\"><span style=\"color:#7c6cf0;\">●<\u002Fspan><span>{{ t }}<\u002Fspan><\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <blockquote data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;margin-top:32px;border-left:3px solid #f5a623;padding:8px 0 8px 26px;font-family:'Noto Serif TC',serif;font-size:clamp(18px,2.4vw,26px);line-height:1.6;color:#e8e6e1;text-wrap:pretty;\">\n      「我是 PM + Tech Lead，AI 是 10 倍速的工程師夥伴。所有設計判斷、需求優先序，以及使用者研究，都是我的。」\n    <\u002Fblockquote>\n  <\u002Fsection>\n\n  <!-- SECURITY -->\n  <section id=\"security\" style=\"max-width:1200px;margin:0 auto;padding:60px clamp(20px,5vw,64px) 40px;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;margin-bottom:44px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#f5a623;letter-spacing:.18em;margin-bottom:12px;\">05 — SECURITY &amp; PRIVACY<\u002Fdiv>\n      <h2 style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:clamp(30px,4.5vw,52px);line-height:1.1;\">資安與隱私<\u002Fh2>\n      <p style=\"color:#9aa0ac;margin-top:14px;font-size:16px;max-width:640px;line-height:1.7;\">從第一行程式碼就把資安與隱私當成預設，而不是事後補丁。處理的是教會與會友的敏感資料，以下是貫穿所有專案的實際做法。<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:16px;\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease,border-color .3s;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,255,255,.01));\" style-hover=\"border-color:rgba(245,166,35,.35)\">\n          <div style=\"font-size:1.6rem;line-height:1;margin-bottom:12px;\">🔑<\u002Fdiv>\n          <div style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;color:#e8e6e1;margin-bottom:7px;\">無密碼登入<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.65;color:#9aa0ac;\">全系統以 LINE OAuth2 為唯一登入，不自建、不儲存任何密碼；錯誤監控關閉個資蒐集（send_default_pii=False）。<\u002Fdiv>\n          <div style=\"margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#6b7280;\">LINE OAuth2 · Sentry<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease,border-color .3s;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,255,255,.01));\" style-hover=\"border-color:rgba(245,166,35,.35)\">\n          <div style=\"font-size:1.6rem;line-height:1;margin-bottom:12px;\">🛡<\u002Fdiv>\n          <div style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;color:#e8e6e1;margin-bottom:7px;\">CSRF 防護<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.65;color:#9aa0ac;\">所有寫入請求強制驗證 token，採 hmac 常數時間比對，抵禦跨站偽造與時序攻擊；搭配 flask-limiter 速率限制防濫用。<\u002Fdiv>\n          <div style=\"margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#6b7280;\">hmac · flask-limiter<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease,border-color .3s;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,255,255,.01));\" style-hover=\"border-color:rgba(245,166,35,.35)\">\n          <div style=\"font-size:1.6rem;line-height:1;margin-bottom:12px;\">🍪<\u002Fdiv>\n          <div style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;color:#e8e6e1;margin-bottom:7px;\">安全 Session Cookie<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.65;color:#9aa0ac;\">Cookie 設定 HttpOnly（防 XSS 竊取）、SameSite=Lax（防 CSRF）、正式環境僅走 HTTPS（Secure）。<\u002Fdiv>\n          <div style=\"margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#6b7280;\">HttpOnly · SameSite · Secure<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease,border-color .3s;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,255,255,.01));\" style-hover=\"border-color:rgba(245,166,35,.35)\">\n          <div style=\"font-size:1.6rem;line-height:1;margin-bottom:12px;\">🔐<\u002Fdiv>\n          <div style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;color:#e8e6e1;margin-bottom:7px;\">金鑰只在後端<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.65;color:#9aa0ac;\">Supabase service_role、LINE/Flask secret 全走環境變數，絕不進版控、絕不暴露前端；前端永遠拿不到高權限金鑰。<\u002Fdiv>\n          <div style=\"margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#6b7280;\">service_role · .env<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease,border-color .3s;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,255,255,.01));\" style-hover=\"border-color:rgba(245,166,35,.35)\">\n          <div style=\"font-size:1.6rem;line-height:1;margin-bottom:12px;\">👁<\u002Fdiv>\n          <div style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;color:#e8e6e1;margin-bottom:7px;\">精細存取控管<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.65;color:#9aa0ac;\">檔案可見範圍分「個人 / 全體 / 指定分組 / 指定用戶」，並自動過濾已封鎖帳號，最小權限原則。<\u002Fdiv>\n          <div style=\"margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#6b7280;\">allowed_users / groups<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease,border-color .3s;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,255,255,.01));\" style-hover=\"border-color:rgba(245,166,35,.35)\">\n          <div style=\"font-size:1.6rem;line-height:1;margin-bottom:12px;\">⏳<\u002Fdiv>\n          <div style=\"font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;color:#e8e6e1;margin-bottom:7px;\">限時分享連結<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.65;color:#9aa0ac;\">檔案分享採 presigned URL，可設 1 小時 / 24 小時 / 7 天到期，逾期自動失效，避免連結外流長期有效。<\u002Fdiv>\n          <div style=\"margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#6b7280;\">Cloudflare R2 presigned<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease,border-color .3s;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;background:linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,25 yle.width = Math.min(100, (h.scrollTop / max) * 100) + '%';\n      };\n      window.addEventListener('scroll', onScroll, { passive: true });\n      onScroll();\n    }\n\n    const navLinks = {};\n    document.querySelectorAll('nav a[href^=\"#\"]').forEach((a) => { navLinks[a.getAttribute('href').slice(1)] = a; });\n    const spy = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          Object.keys(navLinks).forEach((k) => navLinks[k].classList.remove('nav-active'));\n          const link = navLinks[e.target.id];\n          if (link) link.classList.add('nav-active');\n        }\n      });\n    }, { rootMargin: '-45% 0px -50% 0px' });\n    ['about','work','data','stack','security','contact'].forEach((id) => { const s = document.getElementById(id); if (s) spy.observe(s); });\n\n    const chips = document.querySelectorAll('.filter-chip');\n    const cards = document.querySelectorAll('article[data-category]');\n    const demos = {\n      'pitchpal': { url: 'https://winds00171-pitchpal.hf.space/', label: '🎹 立即體驗 ↗' },\n      'Church-Management-System-demo': { url: 'https://church-management-system-demo.onrender.com', label: '🏛 進入示範系統 ↗' },\n      'fooding-hunter': { url: 'https://fooding-hunter.onrender.com/', label: '🍜 開始狩獵 ↗' }\n    };\n    cards.forEach((card) => {\n      const d = demos[card.getAttribute('data-repo')];\n      if (!d) return;\n      const body = card.lastElementChild;\n      if (!body || body.querySelector('.demo-btn')) return;\n      const a = document.createElement('a');\n      a.className = 'demo-btn';\n      a.href = d.url; a.target = '_blank'; a.rel = 'noopener';\n      a.textContent = d.label;\n      a.addEventListener('click', (e) => e.stopPropagation());\n      body.appendChild(a);\n    });\n    chips.forEach((chip) => {\n      chip.addEventListener('click', () => {\n        chips.forEach((c) => c.classList.remove('is-active'));\n        chip.classList.add('is-active');\n        const
